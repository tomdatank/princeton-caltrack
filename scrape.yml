name: Scrape Princeton Dining Menus

on:
  schedule:
    # Runs at 6:00 AM ET daily (10:00 UTC)
    - cron: "0 10 * * *"
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    permissions:
      contents: write  # Needed to commit menu.json back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scrape.py

      - name: Commit updated menu data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/menu.json
          # Only commit if something changed
          git diff --staged --quiet || git commit -m "chore: update menu data $(date -u +'%Y-%m-%d')"
          git push